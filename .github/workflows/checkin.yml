name: Auto Checkin

on:
  schedule:
    - cron: '0 0 * * *'  # 每天UTC时间0点执行（北京时间早上8点）
  workflow_dispatch:  # 允许手动触发
    inputs:
      log_level:
        description: '日志级别'
        required: false
        default: 'info'
        type: choice
        options:
          - error
          - warn
          - info
          - verbose
          - debug
          - silly
      force_run:
        description: '强制执行（忽略今日已签到）'
        required: false
        default: 'false'
        type: boolean

jobs:
  checkin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers with dependencies
        run: npx playwright install chromium --with-deps

      - name: Run checkin script
        env:
          CHECKIN_KEY: ${{ secrets.CHECKIN_KEY }}
          LOG_LEVEL: ${{ inputs.log_level || 'info' }}
          FORCE_RUN: ${{ inputs.force_run || 'false' }}
        run: npm run checkin

      - name: Show result
        if: always()
        run: |
          echo "=== Checkin Results ==="
          if [ -f checkin.log ]; then
            tail -20 checkin.log
          fi
          echo "======================="
